# ============================================================
#  ESPHome – Raspberry Pi Pico W + WireGuard (remote sensor)
#  Uses the custom wireguard component from this repository.
# ============================================================

esphome:
  name: pico-remote
  friendly_name: "Pico W Remote Sensor"

# RP2040 platform (Pico W has CYW43 WiFi)
rp2040:
  board: rpipicow
  framework:
    # arduino-pico ships lwIP which the WireGuard library uses
    platform_version: https://github.com/earlephilhower/arduino-pico/releases/download/4.1.1/package_rp2040_index.json

# Tell ESPHome where the custom component lives
external_components:
  - source:
      type: local
      path: esphome/components   # path to the folder containing wireguard/
    components: [wireguard]

# WiFi – must be up before WireGuard can connect
wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  # The WireGuard tunnel address must be used for OTA / API access
  use_address: 10.6.0.2          # <-- your WireGuard peer address

# SNTP time – required before WireGuard can do the handshake
time:
  - platform: sntp
    id: sntp_time
    servers:
      - pool.ntp.org

# ============================================================
#  WireGuard – custom component
# ============================================================
wireguard:
  id: wg
  time_id: sntp_time

  # This device's VPN IP address (must be unique on your WireGuard subnet)
  address: 10.6.0.2
  netmask: 255.255.255.0         # or 255.255.255.255 for a /32

  # Keys – generate with: wg genkey | tee privatekey | wg pubkey > publickey
  private_key: !secret wg_private_key      # 44-char base64

  # Your WireGuard server (e.g. running wg-easy on your home router / HA box)
  peer_endpoint: !secret wg_server_host    # DDNS hostname or public IP
  peer_public_key: !secret wg_server_pubkey
  peer_port: 51820

  # Optional preshared key for extra security
  # preshared_key: !secret wg_preshared_key

  # Route all traffic through the VPN (recommended for remote devices)
  allowed_ips:
    - address: 0.0.0.0
      netmask: 0.0.0.0

  # Send a keepalive every 25 s so NAT mappings stay alive
  keepalive: 25

  # Reboot if the peer is unreachable for 3 minutes
  reboot_timeout: 3min

  # Status sensors
  status:
    name: "WireGuard Status"
  enabled:
    name: "WireGuard Enabled"
  latest_handshake:
    name: "WireGuard Last Handshake"
  address:
    name: "WireGuard Address"

# ============================================================
#  API + OTA (will travel through the WireGuard tunnel)
# ============================================================
api:
  encryption:
    key: !secret api_key

ota:
  - platform: esphome
    password: !secret ota_password

# Logger over USB serial (helpful for debugging the tunnel)
logger:
  level: DEBUG

# ============================================================
#  Example sensors
# ============================================================
sensor:
  - platform: internal_temperature
    name: "RP2040 Internal Temperature"
    update_interval: 60s

binary_sensor:
  - platform: gpio
    pin:
      number: GP15
      mode: INPUT_PULLUP
    name: "Remote Switch"
    device_class: door

switch:
  - platform: gpio
    pin: GP14
    name: "Remote Relay"
    restore_mode: RESTORE_DEFAULT_OFF
